services:
  - type: web
    name: stl-file-repair-api
    env: docker
    plan: standard
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: stl-repair-data
      mountPath: /data
      sizeGB: 20
    envVars:
      - key: STL_REPAIR_DATA_DIR
        value: /data
      - key: STL_REPAIR_ALLOWED_ORIGINS
        value: https://stl-file-repair.vercel.app,http://localhost:8000,http://127.0.0.1:8000
